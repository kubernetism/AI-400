apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: todo-manager
  labels:
    app: notification-api
    app.kubernetes.io/part-of: agentic-todo-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: notification-api
          image: agentic-todo/notification-api:latest
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: todo-manager
  labels:
    app: notification-api
spec:
  selector:
    app: notification-api
  ports:
    - port: 8002
      targetPort: 8002
      protocol: TCP
  type: ClusterIP
