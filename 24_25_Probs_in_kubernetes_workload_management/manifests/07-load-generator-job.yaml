apiVersion: batch/v1
kind: Job
metadata:
  name: load-generator
spec:
  template:
    spec:
      containers:
      - name: hey
        image: curlimages/curl:8.4.0
        command: ["/bin/sh","-c"]
        args:
        - while true; do curl -sS http://web-stable.default.svc.cluster.local/ >/dev/null; sleep 0.5; done
      restartPolicy: Never
  backoffLimit: 4
