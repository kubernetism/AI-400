apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-manager
  labels:
    app: todo-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-manager
  template:
    metadata:
      labels:
        app: todo-manager
    spec:
      containers:
        - name: todo-manager
          image: todo-manager:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: TODO_PROGRESS_URL
              value: "http://todo-progress-monitoring:8002"
          readinessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: todo-manager
spec:
  selector:
    app: todo-manager
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
  type: ClusterIP
